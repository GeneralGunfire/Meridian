name: Weekly Data Scrape

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  # Manual trigger — use for first-run history bootstrap
  workflow_dispatch:

# Prevent concurrent runs
concurrency:
  group: scrape-data
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pipeline/package-lock.json

      - name: Install pipeline dependencies
        working-directory: pipeline
        run: npm ci

      - name: Run scrapers
        working-directory: pipeline
        run: npm run scrape
        continue-on-error: true   # partial failures must not block the data commit
        env:
          MERIDIAN_DATA_ROOT: ${{ github.workspace }}/data

      - name: Commit new data files
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "data: weekly scrape $(date +%Y-%m-%d)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
